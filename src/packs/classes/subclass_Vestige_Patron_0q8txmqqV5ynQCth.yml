system:
  description:
    value: >-
      <blockquote><p>Channel the Power of Spirits Beyond</p></blockquote>

      <p>Your pact binds you to a vestige—the spiritual remnant of a powerful
      being that exists in a state between life and death, between the mortal
      world and the outer planes. Vestiges are the echoes of celestials who fell
      from grace, fiends who were destroyed but not truly killed, or undead
      beings of such power that their essence persists even after their final
      destruction.</p>

      <p>When you form this pact, a fragment of such a being attaches itself to
      your soul, granting you a companion spirit that fights alongside you and
      channels the divine or profane power it once wielded in full. As your
      power grows, your bond with the vestige deepens, and you begin to manifest
      aspects of its otherworldly nature.</p>
