    value: >-
      <p><em>3rd-level College of Spirits feature</em></p>
      <p>You learn how to contact spirits beyond the grave, letting their power and knowledge flow through you. You gain the following benefits.</p>
      <p><strong>Guiding Whispers.</strong> You know the <em>Guiding Whispers</em> cantrip. It has a range of 60 feet when you cast it.</p>
      <p><strong>Spiritual Focus.</strong> You employ tools that aid you in channeling spirits. You gain a Gaming Set (Playing Cards). You have proficiency with this Gaming Set, and you can use the cards or one of the following items as a Spellcasting Focus for your Bard spells: Arcane Focus (Crystal or Orb), Candle, or Ink Pen.</p>
