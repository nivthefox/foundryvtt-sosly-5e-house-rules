system:
  description:
    value: >-
      <blockquote><p>Walk the Difficult Path of Peace and
      Justice</p></blockquote>

      <p>The Oath of Redemption sets a paladin on a difficult path, one that
      requires a holy warrior to use violence only as a last resort. Paladins
      who dedicate themselves to this oath believe that any person can be
      redeemed and that the path of benevolence and justice is one that anyone
      can walk. These paladins face evil creatures in the hope of turning their
      foes to the light, and they slay their enemies only when such a deed will
      clearly save other lives. Paladins who follow this path are known as
      redeemers.</p>

      <p>While redeemers are idealists, they are no fools. Redeemers know that
      undead, demons, devils, and other supernatural threats can be inherently
      evil. Against such foes, paladins who swear this oath bring the full wrath
      of their weapons and spells to bear. Yet the redeemers still pray that,
      one day, even creatures of wickedness will invite their own
      redemption.</p>
    chat: ''
