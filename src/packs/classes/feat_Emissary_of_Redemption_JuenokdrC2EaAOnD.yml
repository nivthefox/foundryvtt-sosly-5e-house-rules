  description:
    value: >-
      <p>At 20th level, you become an avatar of peace, which gives you two
      benefits:</p>

      <ul>
        <li>You have resistance to all damage dealt by other creatures (their
        attacks, spells, and other effects).</li>
        <li>Whenever a creature hits you with an attack, it takes radiant damage
        equal to half the damage you take from the attack.</li>
      </ul>

      <p>If you attack a creature, cast a spell on it, or deal damage to it by
      any means but this feature, neither benefit works against that creature
      until you finish a long rest.</p>
