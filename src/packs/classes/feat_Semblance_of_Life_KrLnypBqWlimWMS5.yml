  description:
    value: >-
      <p>At 14th level, your vestige can briefly manifest a more powerful form.
      As an Action, you can have your vestige transform, allowing it to cast one
      of the following spells (no spell slot or material components required),
      based on its form:</p>

      <ul>
      <li><strong>Celestial:</strong> <em>Summon Celestial</em> (at 5th level)</li>
      <li><strong>Fiend:</strong> <em>Summon Fiend</em> (at 5th level)</li>
      <li><strong>Undead:</strong> <em>Summon Undead</em> (at 5th level)</li>
      </ul>

      <p>The spell is cast at 5th level without requiring Concentration. The
      summoned creature appears in the vestige's space as the vestige temporarily
      transforms into it. When the spell ends, the vestige returns to its normal
      form in the creature's space.</p>

      <p>Once you use this feature, you can't do so again until you finish a
      Long Rest.</p>
