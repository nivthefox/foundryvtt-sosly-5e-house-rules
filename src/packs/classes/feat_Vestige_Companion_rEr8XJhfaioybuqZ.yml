  description:
    value: >-
      <p>At 3rd level, your patron grants you a companion spirit—a vestige of a
      powerful being from beyond the mortal realm. As an Action, you can summon
      this vestige to an unoccupied space you can see within 30 feet of you.</p>

      <p>When you summon the vestige, choose its form: <strong>Celestial</strong>,
      <strong>Fiend</strong>, or <strong>Undead</strong>. The vestige uses the
      corresponding stat block, which uses your Proficiency Bonus (PB) and
      Charisma modifier in several places.</p>

      <p>The vestige is friendly to you and your companions. In combat, it shares
      your Initiative count but takes its turn immediately after yours. It obeys
      your verbal commands (no action required). If you don't issue any commands,
      it takes the Dodge action and uses its movement to avoid danger.</p>

      <p>The vestige remains until it drops to 0 Hit Points, until you dismiss it
      (no action required), or until you finish a Long Rest. You can summon the
      vestige once, and you regain the ability to do so when you finish a Long
      Rest.</p>

      <section class="fvtt advice" style="margin:0.5rem;padding:0.5rem">
      <article>
      <p>The vestige's statistics are modified as follows when summoned:</p>
      <table>
      <caption>Vestige Companion</caption>
      <tbody>
      <tr><td><strong>AC</strong></td><td>13 + your Charisma modifier</td></tr>
      <tr><td><strong>HP</strong></td><td>4 x your Warlock level</td></tr>
      <tr><td><strong>PB</strong></td><td>equals your Proficiency Bonus</td></tr>
      <tr><td><strong>Attack/Damage</strong></td><td>uses your spell attack modifier; damage bonus equals your Charisma modifier</td></tr>
      </tbody>
      </table>
      </article>
      </section>
