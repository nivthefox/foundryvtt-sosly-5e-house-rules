  description:
    value: >-
      <p>At 6th level, your vestige's divine power recharges more readily. Your
      vestige's Divine Power ability now recharges when you finish a Short Rest
      or Long Rest, instead of only on a Long Rest.</p>

      <p>Additionally, when your vestige is reduced to 0 Hit Points, you can use
      your Reaction to have it instead drop to 1 Hit Point. Once you use this
      reaction, you can't do so again until you finish a Long Rest.</p>
