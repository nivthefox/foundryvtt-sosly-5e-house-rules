      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplDetectPois]{Detect Poison and Disease},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplShieldofFa]{Shield of Faith},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplShiningSmi]{Shining Smite}</td></tr>
      <tr><td>5</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplDaylight00]{Daylight},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplSpiritGuar]{Spirit Guardians}</td></tr>
      <tr><td>7</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplDeathWard0]{Death Ward},
      @UUID[Compendium.sosly-5e-house-rules.extra-spells.Item.KpsilsvW9yCjb3pd]{Sickening Radiance}</td></tr>
      <tr><td>9</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplContagion0]{Contagion},
      @UUID[Compendium.sosly-5e-house-rules.extra-spells.Item.9doA1KTAMirUP5NE]{Dawn}</td></tr>
      </tbody>
