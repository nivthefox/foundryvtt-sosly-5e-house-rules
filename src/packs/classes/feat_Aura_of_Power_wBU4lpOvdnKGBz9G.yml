  description:
    value: >-
      <p>At 10th level, your vestige radiates an aura of otherworldly power.
      While your vestige is within 30 feet of you, both you and your vestige
      gain the following benefits based on the vestige's form:</p>

      <ul>
      <li><strong>Celestial:</strong> You and your vestige have Resistance to
      Radiant damage and Immunity to the Blinded condition.</li>
      <li><strong>Fiend:</strong> You and your vestige have Resistance to Fire
      damage and Immunity to the Frightened condition.</li>
      <li><strong>Undead:</strong> You and your vestige have Resistance to
      Necrotic damage and Immunity to the Charmed condition.</li>
      </ul>
