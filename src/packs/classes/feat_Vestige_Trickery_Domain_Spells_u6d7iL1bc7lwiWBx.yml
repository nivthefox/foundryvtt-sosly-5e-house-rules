    value: >-
      <p>Your vestige channels the deceptive power of the Trickery domain. When
      you reach a Warlock level specified in the Vestige Trickery Domain Spells
      table, you thereafter always have the listed spells prepared.</p>

      <table>
      <caption>Vestige Trickery Domain Spells</caption>
      <thead>
      <tr><td>Warlock Level</td><td>Prepared Spells</td></tr>
      </thead>
      <tbody>
      <tr><td>3</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplCharmPerso]{Charm Person},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplDisguiseSe]{Disguise Self},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplInvisibili]{Invisibility},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplPasswithou]{Pass without Trace}</td></tr>
      <tr><td>5</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplHypnoticPa]{Hypnotic Pattern},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplNondetecti]{Nondetection}</td></tr>
      <tr><td>7</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplConfusion0]{Confusion},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplDimensionD]{Dimension Door}</td></tr>
      <tr><td>9</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplDominatePe]{Dominate Person},
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplModifyMemo]{Modify Memory}</td></tr>
      </tbody>
      </table>

      <section class="secret" id="secret-vestigeTrickerySpells">
      <p><strong>Foundry Note</strong></p>
      <p>These spells are granted automatically as you advance.</p>
      </section>
